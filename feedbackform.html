        <!-- New feedback form section -->
        <section class="feedback-section">
            <h2>Send Us Your Feedback</h2>
            <p>We'd love to hear your thoughts about our blog!</p>
            <form id="feedback-form" action="#" method="post">
                <div class="form-row">
                    <div class="form-group">
                        <label for="name">Name</label>
                        <input type="text" id="name" name="name" placeholder="Your name" required>
                    </div>
                    <div class="form-group">
                        <label for="email">Email</label>
                        <input type="email" id="email" name="email" placeholder="Your email" required>
                    </div>
                </div>



                    <label for="rating">Rate this website:</label>
    <br>
    <input type="radio" name="rating"> Excellent
    <br>
    <input type="radio" name="rating"> Good
    <br>
    <input type="radio" name="rating"> Average
    <br>
    <input type="radio" name="rating"> Poor



<br>
<br>
      <label for="Favourite">What did you like the most:</label>
    <select name="section">
        <option>Choice of Languages</option>
        <option>Content</option>
        <option>Intuititive Navigation</option>
        <option>Structure</option>
        <option>feaures</option>
    </select>
                <div class="form-group">
                    <label for="feedback-type">Feedback Type</label>
                    <select id="feedback-type" name="feedback-type" required>
                        <option value="" disabled selected>Select a category</option>
                        <option value="suggestion">Suggestion</option>
                        <option value="compliment">Compliment</option>
                        <option value="issue">Report an issue</option>
                        <option value="other">Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="message">Message</label>
                    <textarea id="message" name="message" rows="5" placeholder="Your feedback..." required></textarea>
                </div>
                <button type="submit" class="btn-submit">Send Feedback</button>
            </form>
        </section>
